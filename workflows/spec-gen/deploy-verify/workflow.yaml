limits: { max_nodes: 1, wall_clock: 7200, node_timeout: 7200, max_retries: 0, concurrency: 1 }
harness:
  sh: { runtime: bash, write: false }
routes:
  trigger: "{{trigger_store_dir}}"
io:
  in: { queue: pr, contract: contracts/pr.schema.json }
  out:
    trigger: contracts/trigger.schema.json
seed:
  - identity: deploy-verifier
    mode: fresh
    template: deploy-verify
    harness: sh
    payload:
      workspace_repo: "{{workspace_repo}}"
      accept_cmd: "{{accept_cmd}}"
      trigger_store_dir: "{{trigger_store_dir}}"
      deploy_log_dir: "{{deploy_log_dir}}"
      pr_id: "{{pr_id}}"
      spec_id: "{{spec_id}}"
      spec_file: "{{spec_file}}"
      branch: "{{branch}}"
      base_commit: "{{base_commit}}"