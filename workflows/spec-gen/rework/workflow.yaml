limits: { max_nodes: 1, wall_clock: 30, node_timeout: 10, max_retries: 0, concurrency: 1 }
harness:
  sh: { runtime: bash, write: false }
routes:
  trigger: "{{trigger_store_dir}}"
  idea: "{{idea_store_dir}}"
io:
  in: { queue: verdict, contract: contracts/verdict.schema.json }
  out:
    trigger: contracts/trigger.schema.json
    idea: contracts/idea.schema.json
seed:
  - identity: spec-reworker
    mode: fresh
    template: spec-rework
    harness: sh
    payload:
      idea_store_dir: "{{idea_store_dir}}"
      trigger_store_dir: "{{trigger_store_dir}}"
      spec_verdict_id: "{{spec_verdict_id}}"
      spec_id: "{{spec_id}}"
      spec_file: "{{spec_file}}"
      verdict: "{{verdict}}"
      feedback: "{{feedback}}"
      feedback_file: "{{feedback_file?}}"
